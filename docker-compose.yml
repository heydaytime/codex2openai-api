services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkqt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linkqt}
      POSTGRES_DB: linkqt
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkqt"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgres://linkqt:${POSTGRES_PASSWORD:-linkqt}@postgres:5432/linkqt
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-30000}
      MAX_EXECUTION_ATTEMPTS: ${MAX_EXECUTION_ATTEMPTS:-1}
      MAX_FUZZ_ATTEMPTS: ${MAX_FUZZ_ATTEMPTS:-1}
      OLLAMA_MAX_RETRIES: ${OLLAMA_MAX_RETRIES:-1}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-1024}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-20}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
